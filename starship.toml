## FIRST LINE/ROW: Info & Status
# First param в”Җв”Ң
[username]
format = " [в•ӯв”Җ$user]($style)@"
show_always = true
style_root = "bold red"
style_user = "bold red"

# Second param
[hostname]
disabled = false
format = "[$hostname]($style) in "
ssh_only = false
style = "bold dimmed red"
trim_at = "-"

# Third param
[directory]
style = "purple"
truncate_to_repo = true
truncation_length = 0
truncation_symbol = "repo: "

# Fourth param
[sudo]
disabled = false

# Before all the version info (python, nodejs, php, etc.)
[git_status]
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
deleted = "x"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
style = "white"

# Last param in the first line/row
[cmd_duration]
disabled = false
format = "took [$duration]($style)"
min_time = 1


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
charging_symbol = "п–ғ"
disabled = true
discharging_symbol = "п–Ӯ"
full_symbol = "п•ё"

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
disabled = false
style = "bold red"
threshold = 15

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
disabled = true
style = "bold yellow"
threshold = 50

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
disabled = true
style = "bold green"
threshold = 80

# Prompt: optional param 1
[time]
disabled = true
format = " рҹ•ҷ $time($style)\n"
style = "bright-white"
time_format = "%T"

# Prompt: param 2 в””в”Җ
[character]
success_symbol = " [в•°в”ҖпҮ‘ ](bold red)"
error_symbol = " [в•°в”ҖпҮ‘ ](bold red)"

# SYMBOLS
[status]
disabled = false
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
pipestatus = true
symbol = "рҹ”ҙ"

